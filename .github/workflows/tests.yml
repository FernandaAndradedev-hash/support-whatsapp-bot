name: Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-fake"
          OPENAI_API_KEY: "sk-test-fake"
          EVOLUTION_API_KEY: "test-key"
        run: pytest tests/ -v